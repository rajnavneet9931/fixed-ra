version: '3.9'

services:
  app:
    build: .
    container_name: baresober-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: baresober-mongo
    profiles:
      - localdb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: baresober
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
